<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lessons</title>
</head>
<body>

<h1>Lessons</h1>

<div th:each="lesson : ${lessons}">

    <h2 th:text="${lesson.title}"></h2>

    <a th:href="@{'/lesson/' + ${lesson.id}}">
        View Lesson
    </a>

    <hr>

</div>

</body>
</html>
