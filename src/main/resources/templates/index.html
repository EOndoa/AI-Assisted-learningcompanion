<html>
<head>

          rel="stylesheet"
  >

  <!-- Custom CSS -->
  <link href="/css/style.css" rel="stylesheet">

</head>

    AI Assisted Learning Companion

            th:text="${totalCourses}">

    </div>

        <p>Completed Lessons</p>
      </div>
    </div>

    <div class="col-md-3">
