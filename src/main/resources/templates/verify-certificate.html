<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify Certificate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-5">

        <h2 class="fw-bold text-center">Certificate Verification</h2>

        <p class="text-muted text-center">
            Enter a certificate number to verify its authenticity.
        </p>

        <form action="/verify-certificate" method="post" class="mt-4">

            <div class="mb-3">
                <label>Certificate Number</label>
                <input type="text" name="certificateNumber" class="form-control"
                       placeholder="Example: AILC-1-5" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Verify Certificate
            </button>

        </form>

        <div th:if="${error}" class="alert alert-danger mt-4" th:text="${error}"></div>

        <div th:if="${valid}" class="alert alert-success mt-4">

            <h4>Certificate is Valid ✅</h4>

            <p>
                <strong>Student:</strong>
                <span th:text="${student.fullName}"></span>
            </p>

            <p>
                <strong>Course:</strong>
                <span th:text="${course.title}"></span>
            </p>

            <p>
                <strong>Certificate Number:</strong>
                <span th:text="${certificateNumber}"></span>
            </p>

            <p>
                <strong>Completed At:</strong>
                <span th:text="${#temporals.format(completedAt, 'dd MMMM yyyy')}"></span>
            </p>

        </div>

        <div class="text-center mt-4">
            <a href="/login" class="btn btn-secondary">Back to Login</a>
        </div>

    </div>

</div>

</body>
</html>
