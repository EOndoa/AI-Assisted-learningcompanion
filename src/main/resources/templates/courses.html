<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Courses</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="/css/style.css" rel="stylesheet">

    <style>
        .courses-header {
            background: linear-gradient(135deg, #0d6efd, #3b82f6);
            color: white;
            padding: 35px;
            border-radius: 20px;
        }

        .course-card {
            border: none;
            border-radius: 20px;
            transition: 0.3s;
        }

        .course-card:hover {
            transform: translateY(-5px);
        }

        .course-icon {
            font-size: 38px;
        }

        .search-box {
            border-radius: 18px;
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold">Available Courses</span>

        <a href="/dashboard" class="btn btn-outline-light btn-sm">
            Dashboard
        </a>
    </div>
</nav>

<div class="container mt-5 mb-5">

    <div class="courses-header shadow">
        <h1 class="fw-bold">Explore Courses</h1>

        <p class="lead mb-0">
            Search, enroll and continue learning with structured lessons and quizzes.
        </p>
    </div>

    <div class="card shadow p-4 mt-4 search-box border-0">

        <form method="get"
              action="/courses"
              class="row g-3">

            <div class="col-md-10">
                <input type="text"
                       name="keyword"
                       class="form-control form-control-lg"
                       th:value="${keyword}"
                       placeholder="Search courses by title or description...">
            </div>

            <div class="col-md-2">
                <button type="submit"
                        class="btn btn-primary btn-lg w-100">
                    Search
                </button>
            </div>

        </form>

        <div class="mt-3"
             th:if="${keyword != null and !#strings.isEmpty(keyword)}">

            <span class="badge bg-info text-dark">
                Search results for:
                <span th:text="${keyword}"></span>
            </span>

            <a href="/courses"
               class="btn btn-sm btn-outline-secondary ms-2">
                Clear
            </a>

        </div>

    </div>

    <div class="d-flex justify-content-between align-items-center mt-5 mb-3">

        <h3 class="fw-bold mb-0">
            Course Catalog
        </h3>

        <span class="badge bg-primary"
              th:text="${#lists.size(courses)} + ' courses found'">
            0 courses found
        </span>

    </div>

    <div th:if="${#lists.isEmpty(courses)}"
         class="alert alert-info shadow-sm">

        No courses found. Try another search keyword.

    </div>

    <div class="row g-4"
         th:if="${!#lists.isEmpty(courses)}">

        <div class="col-md-4"
             th:each="course : ${courses}">

            <div class="card course-card shadow p-4 h-100">

                <div class="course-icon mb-3">
                    📚
                </div>

                <h5 class="fw-bold"
                    th:text="${course.title}">
                    Course Title
                </h5>

                <p class="text-muted"
                   th:text="${course.description}">
                    Course Description
                </p>

                <div class="mt-auto">

                    <div class="d-flex gap-2 flex-wrap">

                        <a th:href="@{'/courses/' + ${course.id} + '/lessons'}"
                           class="btn btn-primary btn-sm">
                            View Lessons
                        </a>

                        <a th:href="@{'/courses/enroll/' + ${course.id}}"
                           class="btn btn-success btn-sm">
                            Enroll
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
