<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Manage Lesson Quiz Questions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand fw-bold">
            Manage Lesson Quiz Questions
        </span>

        <a href="/admin"
           class="btn btn-outline-light btn-sm">
            Back
        </a>
    </div>
</nav>

<div class="container mt-5 mb-5">

    <div class="row g-4">

        <div class="col-md-5">

            <div class="card shadow p-4 border-0">

                <h4 class="fw-bold">
                    Add / Edit Question
                </h4>

                <p class="text-muted">
                    Each lesson should have 5 questions. Students must score at least 80%.
                </p>

                <form th:action="@{/admin/questions/save}"
                      th:object="${question}"
                      method="post">

                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label">Select Lesson</label>

                        <select th:field="*{lesson}"
                                class="form-control"
                                required>

                            <option value="">-- Select Lesson --</option>

                            <option th:each="lesson : ${lessons}"
                                    th:value="${lesson.id}"
                                    th:text="${lesson.title}">
                            </option>

                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Question</label>

                        <textarea th:field="*{questionText}"
                                  class="form-control"
                                  rows="3"
                                  required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Option A</label>
                        <input type="text"
                               th:field="*{optionA}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Option B</label>
                        <input type="text"
                               th:field="*{optionB}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Option C</label>
                        <input type="text"
                               th:field="*{optionC}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Option D</label>
                        <input type="text"
                               th:field="*{optionD}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correct Answer</label>

                        <select th:field="*{correctAnswer}"
                                class="form-control"
                                required>

                            <option value="">-- Select Correct Option --</option>
                            <option value="A">Option A</option>
                            <option value="B">Option B</option>
                            <option value="C">Option C</option>
                            <option value="D">Option D</option>

                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Difficulty Level</label>

                        <select th:field="*{difficultyLevel}"
                                class="form-control">

                            <option value="">-- Select Difficulty --</option>
                            <option value="Easy">Easy</option>
                            <option value="Medium">Medium</option>
                            <option value="Hard">Hard</option>

                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Explanation</label>

                        <textarea th:field="*{explanation}"
                                  class="form-control"
                                  rows="3"
                                  placeholder="Explain why the correct answer is right."></textarea>
                    </div>

                    <button type="submit"
                            class="btn btn-warning">
                        Save Question
                    </button>

                </form>

            </div>

        </div>

        <div class="col-md-7">

            <div class="card shadow p-4 border-0">

                <h4 class="fw-bold">
                    Existing Questions
                </h4>

                <p class="text-muted">
                    Questions are grouped by lesson.
                </p>

                <table class="table table-bordered table-hover mt-3">

                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Lesson</th>
                        <th>Question</th>
                        <th>Correct</th>
                        <th>Difficulty</th>
                        <th>Action</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="question : ${questions}">

                        <td th:text="${question.id}"></td>

                        <td>
                            <span th:if="${question.lesson != null}"
                                  th:text="${question.lesson.title}">
                            </span>

                            <span th:if="${question.lesson == null}"
                                  class="text-danger">
                                No Lesson
                            </span>
                        </td>

                        <td th:text="${question.questionText}"></td>

                        <td>
                            <span class="badge bg-success"
                                  th:text="${question.correctAnswer}">
                            </span>
                        </td>

                        <td>
                            <span class="badge bg-info text-dark"
                                  th:text="${question.difficultyLevel}">
                                Easy
                            </span>
                        </td>

                        <td>
                            <a th:href="@{'/admin/questions/edit/' + ${question.id}}"
                               class="btn btn-warning btn-sm">
                                Edit
                            </a>

                            <a th:href="@{'/admin/questions/delete/' + ${question.id}}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this question?')">
                                Delete
                            </a>
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</body>

</html>
