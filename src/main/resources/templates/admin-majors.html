<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Manage Majors</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link href="/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
        <span class="navbar-brand fw-bold">
            Manage Majors
        </span>

    <a href="/admin"
       class="btn btn-outline-light btn-sm">
      Back
    </a>
  </div>
</nav>

<div class="container mt-5 mb-5">

  <div class="row g-4">

    <div class="col-md-5">

      <div class="card shadow p-4 border-0">

        <h4 class="fw-bold">
          Add / Edit Major
        </h4>

        <p class="text-muted">
          Majors help organize courses into professional learning domains.
        </p>

        <form th:action="@{/admin/majors/save}"
              th:object="${major}"
              method="post">

          <input type="hidden" th:field="*{id}">

          <div class="mb-3">
            <label class="form-label">
              Major Name
            </label>

            <input type="text"
                   th:field="*{name}"
                   class="form-control"
                   placeholder="Example: Cybersecurity"
                   required>
          </div>

          <div class="mb-3">
            <label class="form-label">
              Description
            </label>

            <textarea th:field="*{description}"
                      class="form-control"
                      rows="5"
                      placeholder="Describe this major..."
                      required></textarea>
          </div>

          <button type="submit"
                  class="btn btn-primary w-100">
            Save Major
          </button>

        </form>

      </div>

    </div>

    <div class="col-md-7">

      <div class="card shadow p-4 border-0">

        <h4 class="fw-bold">
          Existing Majors
        </h4>

        <p class="text-muted">
          Review, update or remove learning domains.
        </p>

        <table class="table table-bordered table-hover mt-3">

          <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Major</th>
            <th>Description</th>
            <th width="140">Action</th>
          </tr>
          </thead>

          <tbody>

          <tr th:each="major : ${majors}">

            <td th:text="${major.id}"></td>

            <td>
                            <span class="badge bg-primary"
                                  th:text="${major.name}">
                                Major
                            </span>
            </td>

            <td th:text="${major.description}"></td>

            <td>
              <a th:href="@{'/admin/majors/edit/' + ${major.id}}"
                 class="btn btn-warning btn-sm mb-1">
                Edit
              </a>

              <a th:href="@{'/admin/majors/delete/' + ${major.id}}"
                 class="btn btn-danger btn-sm mb-1"
                 onclick="return confirm('Delete this major? Courses linked to it may be affected.')">
                Delete
              </a>
            </td>

          </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>

</body>

</html>
