<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quiz Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Quiz Result</span>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-5 text-center">

        <h1>Quiz Result</h1>

        <h3 class="mt-4">
            Score:
            <span th:text="${result.correctAnswers}"></span>
            /
            <span th:text="${result.totalQuestions}"></span>
        </h3>

        <h2 class="mt-3">
            <span th:text="${#numbers.formatDecimal(result.percentage, 0, 0)}"></span>%
        </h2>

        <div th:if="${result.passed}" class="alert alert-success mt-4">
            Congratulations! You passed the quiz.
        </div>

        <div th:if="${!result.passed}" class="alert alert-warning mt-4">
            You need more revision. Use the AI assistant and try again.
        </div>

        <div class="mt-4">
            <a href="/quiz" class="btn btn-primary">Retake Quiz</a>
            <a href="/quiz-history" class="btn btn-dark">View Quiz History</a>
            <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
        </div>

    </div>

</div>

</body>
</html>
