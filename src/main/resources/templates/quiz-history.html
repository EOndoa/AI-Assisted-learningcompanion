<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quiz History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Quiz History</span>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">My Quiz Results</h2>

    <div th:if="${#lists.isEmpty(results)}" class="alert alert-info">
        No quiz results available yet.
    </div>

    <table class="table table-bordered table-hover shadow-sm bg-white"
           th:if="${!#lists.isEmpty(results)}">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Correct Answers</th>
            <th>Total Questions</th>
            <th>Percentage</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="result : ${results}">
            <td th:text="${result.id}"></td>
            <td th:text="${result.correctAnswers}"></td>
            <td th:text="${result.totalQuestions}"></td>
            <td th:text="${#numbers.formatDecimal(result.percentage, 0, 0) + '%'}"></td>
            <td>
                <span th:if="${result.passed}" class="badge bg-success">Passed</span>
                <span th:if="${!result.passed}" class="badge bg-warning text-dark">Failed</span>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
