<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Learning Progress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Learning Progress</span>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="fw-bold">My Progress Dashboard</h2>
    <p class="text-muted">Track your courses, quizzes, and learning performance.</p>

    <div class="row g-4 mt-3">

        <div class="col-md-6">
            <div class="card shadow p-4">
                <h4>Course Progress</h4>

                <div th:if="${#lists.isEmpty(enrollments)}" class="alert alert-info">
                    You have not enrolled in any course yet.
                </div>

                <div th:each="enrollment : ${enrollments}" class="mb-4">
                    <h6 th:text="${enrollment.course.title}">Course Title</h6>

                    <div class="progress">
                        <div class="progress-bar bg-success"
                             th:style="'width:' + ${enrollment.progressPercentage} + '%'"
                             th:text="${#numbers.formatDecimal(enrollment.progressPercentage,0,0) + '%'}">
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow p-4">
                <h4>Quiz Performance</h4>

                <div th:if="${#lists.isEmpty(quizResults)}" class="alert alert-info">
                    No quiz results yet.
                </div>

                <table class="table table-bordered" th:if="${!#lists.isEmpty(quizResults)}">
                    <thead>
                    <tr>
                        <th>Score</th>
                        <th>Percentage</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="result : ${quizResults}">
                        <td>
                            <span th:text="${result.correctAnswers}"></span> /
                            <span th:text="${result.totalQuestions}"></span>
                        </td>

                        <td th:text="${#numbers.formatDecimal(result.percentage,0,0) + '%'}"></td>

                        <td>
                            <span th:if="${result.passed}" class="badge bg-success">Passed</span>
                            <span th:if="${!result.passed}" class="badge bg-warning text-dark">Failed</span>
                        </td>
                    </tr>
                    </tbody>
                </table>

            </div>
        </div>

    </div>

</div>

</body>
</html>
