<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI Usage Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">AI Usage Analytics</span>
        <a href="/admin" class="btn btn-outline-light btn-sm">Admin Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="fw-bold">Student AI Questions</h2>
    <p class="text-muted">Monitor how learners use the AI assistant.</p>

    <div th:if="${#lists.isEmpty(aiUsages)}" class="alert alert-info">
        No AI usage records yet.
    </div>

    <table class="table table-bordered table-hover shadow bg-white"
           th:if="${!#lists.isEmpty(aiUsages)}">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Student</th>
            <th>Email</th>
            <th>Question</th>
            <th>Asked At</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="usage : ${aiUsages}">
            <td th:text="${usage.id}"></td>
            <td th:text="${usage.student.fullName}"></td>
            <td th:text="${usage.student.email}"></td>
            <td th:text="${usage.question}"></td>
            <td th:text="${#temporals.format(usage.askedAt, 'dd MMM yyyy HH:mm')}"></td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
