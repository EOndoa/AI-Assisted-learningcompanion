<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Leaderboard</span>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="fw-bold">Top Learners</h2>
    <p class="text-muted">Ranking based on badges, quizzes and completed courses.</p>

    <table class="table table-bordered table-hover shadow bg-white mt-4">

        <thead class="table-dark">
        <tr>
            <th>Rank</th>
            <th>Student</th>
            <th>Email</th>
            <th>Badges</th>
            <th>Quizzes</th>
            <th>Completed Courses</th>
            <th>Total Score</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="student, stat : ${students}">
            <td>
                <span th:if="${stat.index == 0}">🥇</span>
                <span th:if="${stat.index == 1}">🥈</span>
                <span th:if="${stat.index == 2}">🥉</span>
                <span th:if="${stat.index > 2}" th:text="${stat.index + 1}"></span>
            </td>

            <td th:text="${student.fullName}"></td>
            <td th:text="${student.email}"></td>
            <td th:text="${student.badgeCount}"></td>
            <td th:text="${student.quizCount}"></td>
            <td th:text="${student.completedCourses}"></td>
            <td>
                <span class="badge bg-primary" th:text="${student.score}"></span>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
