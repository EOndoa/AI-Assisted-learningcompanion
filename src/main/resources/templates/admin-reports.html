<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reports & Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Reports & Analytics Center</span>
        <a href="/admin" class="btn btn-outline-light btn-sm">Admin Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="fw-bold">Platform Reports</h2>
    <p class="text-muted">Overview of learning activity and system performance.</p>

    <div class="row g-4 mt-3">

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <h5>Total Courses</h5>
                <h2 class="text-primary" th:text="${totalCourses}">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <h5>Total Lessons</h5>
                <h2 class="text-success" th:text="${totalLessons}">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <h5>Quiz Questions</h5>
                <h2 class="text-warning" th:text="${totalQuestions}">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <h5>Total Students</h5>
                <h2 class="text-info" th:text="${totalStudents}">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <h5>Total Enrollments</h5>
                <h2 class="text-danger" th:text="${totalEnrollments}">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <h5>AI Questions Asked</h5>
                <h2 class="text-secondary" th:text="${totalAIQuestions}">0</h2>
            </div>
        </div>

    </div>

</div>

</body>
</html>
