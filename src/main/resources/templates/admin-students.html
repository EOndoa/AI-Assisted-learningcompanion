<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Manage Students</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">
            Student Management
        </span>

        <a href="/admin" class="btn btn-outline-light btn-sm">
            Dashboard
        </a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">
        Registered Users
    </h2>

    <table class="table table-bordered table-hover shadow bg-white">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th width="320">Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="student : ${students}">

            <td th:text="${student.id}"></td>

            <td th:text="${student.fullName}"></td>

            <td th:text="${student.email}"></td>

            <td>
                <span class="badge bg-primary" th:text="${student.role}"></span>
            </td>

            <td>
                <span
                        th:if="${student.enabled}"
                        class="badge bg-success"
                >
                    Verified
                </span>

                <span
                        th:if="${!student.enabled}"
                        class="badge bg-warning text-dark"
                >
                    Pending / Disabled
                </span>
            </td>

            <td>

                <a
                        th:if="${!student.enabled}"
                        th:href="@{'/admin/students/verify/' + ${student.id}}"
                        class="btn btn-success btn-sm"
                >
                    Verify
                </a>

                <a
                        th:if="${student.enabled}"
                        th:href="@{'/admin/students/disable/' + ${student.id}}"
                        class="btn btn-secondary btn-sm"
                        onclick="return confirm('Disable this user?')"
                >
                    Disable
                </a>

                <a
                        th:if="${student.role == 'STUDENT'}"
                        th:href="@{'/admin/students/make-admin/' + ${student.id}}"
                        class="btn btn-danger btn-sm"
                        onclick="return confirm('Promote this user to ADMIN?')"
                >
                    Make Admin
                </a>

                <a
                        th:if="${student.role == 'ADMIN'}"
                        th:href="@{'/admin/students/make-student/' + ${student.id}}"
                        class="btn btn-warning btn-sm"
                        onclick="return confirm('Demote this admin to STUDENT?')"
                >
                    Make Student
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
