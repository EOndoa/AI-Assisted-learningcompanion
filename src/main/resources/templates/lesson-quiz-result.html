<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Lesson Quiz Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold">
            Lesson Quiz Result
        </span>

        <a href="/dashboard"
           class="btn btn-outline-light btn-sm">
            Dashboard
        </a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-5 text-center">

        <h2 class="fw-bold">
            Your Quiz Result
        </h2>

        <hr>

        <h1 th:if="${result.passed}"
            class="text-success">
            Passed ✅
        </h1>

        <h1 th:if="${!result.passed}"
            class="text-danger">
            Not Passed ❌
        </h1>

        <p class="lead mt-4">
            Score:
            <strong th:text="${result.correctAnswers}">0</strong>
            /
            <strong th:text="${result.totalQuestions}">0</strong>
        </p>

        <p class="lead">
            Percentage:
            <strong th:text="${result.percentage}">0</strong>%
        </p>

        <div th:if="${result.passed}"
             class="alert alert-success mt-4">
            Congratulations! You scored at least 80%.
            You may continue to the next lesson.
        </div>

        <div th:if="${!result.passed}"
             class="alert alert-warning mt-4">
            You need at least 80% to pass.
            Please review the lesson and try again.
        </div>

        <div class="mt-4">

            <a th:href="@{'/lesson/' + ${lessonId}}"
               class="btn btn-primary">
                Back to Lesson
            </a>

            <a th:href="@{'/lesson/' + ${lessonId} + '/quiz'}"
               class="btn btn-warning">
                Retry Quiz
            </a>

        </div>

    </div>

</div>

</body>
</html>
