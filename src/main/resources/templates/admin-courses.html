<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Manage Courses</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link href="/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
        <span class="navbar-brand fw-bold">
            Manage Courses
        </span>

    <a href="/admin"
       class="btn btn-outline-light btn-sm">
      Back
    </a>
  </div>
</nav>

<div class="container mt-5 mb-5">

  <div class="row g-4">

    <div class="col-md-5">

      <div class="card shadow p-4 border-0">

        <h4 class="mb-3 fw-bold">
          Add / Edit Course
        </h4>

        <p class="text-muted">
          Organize every course under a major so learners can browse the catalog professionally.
        </p>

        <form th:action="@{/admin/courses/save}"
              th:object="${course}"
              method="post">

          <input type="hidden" th:field="*{id}">

          <div class="mb-3">

            <label class="form-label">
              Major
            </label>

            <select th:field="*{major}"
                    class="form-control"
                    required>

              <option value="">
                -- Select Major --
              </option>

              <option th:each="major : ${majors}"
                      th:value="${major.id}"
                      th:text="${major.name}">
              </option>

            </select>

          </div>

          <div class="mb-3">

            <label class="form-label">
              Course Title
            </label>

            <input type="text"
                   th:field="*{title}"
                   class="form-control"
                   required>

          </div>

          <div class="mb-3">

            <label class="form-label">
              Description
            </label>

            <textarea th:field="*{description}"
                      class="form-control"
                      rows="5"
                      required></textarea>

          </div>

          <button type="submit"
                  class="btn btn-primary w-100">
            Save Course
          </button>

        </form>

      </div>

    </div>

    <div class="col-md-7">

      <div class="card shadow p-4 border-0">

        <h4 class="mb-3 fw-bold">
          Existing Courses
        </h4>

        <p class="text-muted">
          Review, edit or delete courses grouped by major.
        </p>

        <table class="table table-bordered table-hover">

          <thead class="table-dark">

          <tr>
            <th>ID</th>
            <th>Major</th>
            <th>Course Title</th>
            <th>Description</th>
            <th width="140">Action</th>
          </tr>

          </thead>

          <tbody>

          <tr th:each="course : ${courses}">

            <td th:text="${course.id}"></td>

            <td>
                            <span th:if="${course.major != null}"
                                  class="badge bg-primary"
                                  th:text="${course.major.name}">
                                Major
                            </span>

              <span th:if="${course.major == null}"
                    class="badge bg-secondary">
                                Unclassified
                            </span>
            </td>

            <td th:text="${course.title}"></td>

            <td th:text="${course.description}"></td>

            <td>
              <a th:href="@{'/admin/courses/edit/' + ${course.id}}"
                 class="btn btn-warning btn-sm mb-1">
                Edit
              </a>

              <a th:href="@{'/admin/courses/delete/' + ${course.id}}"
                 class="btn btn-danger btn-sm mb-1"
                 onclick="return confirm('Are you sure you want to delete this course?')">
                Delete
              </a>
            </td>

          </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>

</body>

</html>
