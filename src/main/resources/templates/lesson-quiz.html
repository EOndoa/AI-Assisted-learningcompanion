<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Lesson Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-warning shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold text-dark">
            Lesson Quiz
        </span>

        <a th:href="@{'/lesson/' + ${lessonId}}"
           class="btn btn-outline-dark btn-sm">
            Back to Lesson
        </a>
    </div>
</nav>

<div class="container mt-5 mb-5">

    <div class="card shadow p-5">

        <h2 class="fw-bold">
            Lesson Assessment
        </h2>

        <p class="text-muted">
            Answer the questions below. You need at least <strong>80%</strong> to pass this lesson quiz.
        </p>

        <div th:if="${#lists.isEmpty(questions)}" class="alert alert-warning mt-4">
            No quiz questions have been added for this lesson yet.
        </div>

        <form th:if="${!#lists.isEmpty(questions)}"
              th:action="@{'/lesson/' + ${lessonId} + '/quiz/submit'}"
              method="post">

            <div th:each="question, stat : ${questions}"
                 class="card mt-4 p-4 border-0 shadow-sm">

                <h5>
                    Question
                    <span th:text="${stat.index + 1}">1</span>
                </h5>

                <p class="fw-bold"
                   th:text="${question.questionText}">
                    Question text
                </p>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           th:name="'question_' + ${question.id}"
                           th:value="${question.optionA}"
                           required>

                    <label class="form-check-label"
                           th:text="${question.optionA}">
                        Option A
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           th:name="'question_' + ${question.id}"
                           th:value="${question.optionB}">

                    <label class="form-check-label"
                           th:text="${question.optionB}">
                        Option B
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           th:name="'question_' + ${question.id}"
                           th:value="${question.optionC}">

                    <label class="form-check-label"
                           th:text="${question.optionC}">
                        Option C
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           th:name="'question_' + ${question.id}"
                           th:value="${question.optionD}">

                    <label class="form-check-label"
                           th:text="${question.optionD}">
                        Option D
                    </label>
                </div>

            </div>

            <button type="submit"
                    class="btn btn-success mt-4">
                Submit Lesson Quiz
            </button>

        </form>

    </div>

</div>

</body>
</html>
